<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CRM | Людмила Мельверт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; }
        .btn-gold { background-color: #f5b042; }
        .btn-gold:hover { background-color: #e09e2e; }
        .btn-green { background-color: #10b981; }
        .btn-green:hover { background-color: #059669; }
        .btn-gray { background-color: #6b7280; }
        .btn-gray:hover { background-color: #4b5563; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 9999px; font-size: 16px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        input, select, textarea { font-size: 16px; padding: 10px; border-radius: 10px; border: 1px solid #d1d5db; }
        label { font-weight: 600; font-size: 14px; }
    </style>
</head>
<body class="bg-gray-100">

<div class="toast" id="toast">✅ Готово</div>

<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-2">
        <div class="flex items-center gap-3">
            <img src="логотип недвижка золотой.png" alt="Лого" class="h-10 w-auto">
            <div><h1 class="text-xl font-bold text-gray-800">Людмила Мельверт</h1><p class="text-xs text-gray-500">CRM Риэлтора</p></div>
        </div>
        <div class="flex gap-2">
            <a href="catalog.html" class="bg-gray-200 px-4 py-2 rounded-lg text-sm">📋 Каталог</a>
            <a href="index.html" class="bg-gray-200 px-4 py-2 rounded-lg text-sm">🏠 Лендинг</a>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
        <h2 class="text-2xl font-bold text-gray-800">📦 Объекты недвижимости</h2>
        <button onclick="openAddModal()" class="btn-gold text-gray-900 px-4 py-2 rounded-lg font-semibold">➕ Добавить объект</button>
    </div>

    <div id="objectsList" class="space-y-3">Загрузка...</div>
</main>

<!-- Модальное окно -->
<div id="objectModal" class="modal">
    <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
        <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
            <h3 id="modalTitle" class="text-xl font-bold">➕ Новый объект</h3>
            <button onclick="closeModal()" class="text-gray-500 text-3xl">&times;</button>
        </div>
        <div class="p-6 space-y-3">
            <input type="hidden" id="objectId">
            <div><label>🏠 Адрес *</label><input type="text" id="address" class="w-full border rounded-lg"></div>
            <div><label>💰 Цена (₽) *</label><input type="number" id="price" class="w-full border rounded-lg"></div>
            <div class="grid grid-cols-2 gap-3">
                <div><label>Комнат</label><input type="number" id="rooms" class="w-full border rounded-lg"></div>
                <div><label>Этаж</label><input type="text" id="floor" class="w-full border rounded-lg" placeholder="5/9"></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div><label>Площадь (м²)</label><input type="text" id="area" class="w-full border rounded-lg"></div>
                <div><label>Балкон</label><select id="balcony" class="w-full border rounded-lg"><option value="">Нет</option><option value="балкон">Балкон</option><option value="лоджия">Лоджия</option></select></div>
            </div>
            <div><label>📝 Описание</label><textarea id="description" rows="3" class="w-full border rounded-lg"></textarea></div>
            <div><label>📁 Ссылка на фото (Яндекс Диск)</label><input type="text" id="photoUrl" class="w-full border rounded-lg"></div>
            <div><label>Статус</label><select id="status" class="w-full border rounded-lg"><option value="активно">Активно (в каталоге)</option><option value="неактивно">Неактивно (скрыто)</option><option value="продано">Продано</option></select></div>
        </div>
        <div class="border-t px-6 py-4 flex justify-end gap-3">
            <button onclick="closeModal()" class="px-4 py-2 border rounded-lg">Отмена</button>
            <button onclick="saveObject()" class="btn-gold text-gray-900 px-4 py-2 rounded-lg font-semibold">Сохранить</button>
        </div>
    </div>
</div>

<script>
    // ==== ЭТО ВАШ НОВЫЙ URL ====
    const API_URL = 'https://script.google.com/macros/s/AKfycbwOCClO768kELSJSHjmP4SI56WvHSeUdG6Fr2WfTzVaxnex89Uam9B-bAeEA6hNYl9jIw/exec';
    
    let objects = [];
    let editId = null;

    function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }

    async function loadObjects() {
        try {
            const response = await fetch(`${API_URL}?action=getObjects`);
            const data = await response.json();
            if (data.status === 'success') {
                objects = data.objects || [];
                renderObjects(objects);
            } else { showToast('Ошибка загрузки'); }
        } catch(e) { showToast('Ошибка соединения'); }
    }

    function renderObjects(objectsList) {
        const container = document.getElementById('objectsList');
        if (objectsList.length === 0) { container.innerHTML = '<div class="text-center py-10 text-gray-500">📭 Нет объектов</div>'; return; }
        
        container.innerHTML = objectsList.map(obj => `
            <div class="bg-white rounded-xl shadow-sm p-4">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="w-full md:w-32 h-32 bg-gray-200 rounded-lg flex items-center justify-center">
                        ${obj.Фото ? `<img src="${obj.Фото}" class="w-full h-full object-cover rounded-lg">` : '<i class="fas fa-home text-gray-400 text-4xl"></i>'}
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start flex-wrap gap-2">
                            <h3 class="text-xl font-bold text-gray-800">${obj.Адрес || 'Без адреса'}</h3>
                            <button onclick="toggleVisibility(${obj.ID}, '${obj.Статус}')" class="px-3 py-1 rounded-lg text-sm font-semibold ${obj.Статус === 'активно' ? 'btn-green text-white' : 'btn-gray text-white'}">
                                ${obj.Статус === 'активно' ? '✅ Активно' : (obj.Статус === 'неактивно' ? '⏸ Неактивно' : '❌ Продано')}
                            </button>
                        </div>
                        <p class="text-2xl font-bold text-gold mt-1">${Number(obj.Цена).toLocaleString()} ₽</p>
                        <div class="flex gap-3 mt-2 text-sm text-gray-600">
                            <span><i class="fas fa-door-open"></i> ${obj.Комнат || '?'} комн.</span>
                            <span><i class="fas fa-layer-group"></i> ${obj.Этаж || '?'} эт.</span>
                            <span><i class="fas fa-ruler-combined"></i> ${obj.Площадь || '?'} м²</span>
                        </div>
                        <div class="flex gap-2 mt-3">
                            <button onclick="editObject(${obj.ID})" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">✏️ Ред.</button>
                            <button onclick="copyObject(${obj.ID})" class="bg-purple-600 text-white px-3 py-1 rounded-lg text-sm">📋 Копировать</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function toggleVisibility(id, currentStatus) {
        let newStatus = 'неактивно';
        if (currentStatus === 'неактивно') newStatus = 'активно';
        if (currentStatus === 'продано') { showToast('Продано нельзя активировать'); return; }
        try {
            await fetch(`${API_URL}?action=updateStatus&id=${id}&status=${newStatus}`);
            showToast(`Статус изменён на ${newStatus === 'активно' ? 'Активно' : 'Неактивно'}`);
            loadObjects();
        } catch(e) { showToast('Ошибка'); }
    }

    function copyObject(id) {
        const obj = objects.find(o => o.ID == id);
        if (!obj) return;
        const text = `${obj.Адрес}\n💰 ${Number(obj.Цена).toLocaleString()} ₽\n📐 ${obj.Комнат} комн., ${obj.Площадь} м², ${obj.Этаж} этаж\n📞 +7 (960) 763-51-70\n🏠 Людмила Мельверт`;
        navigator.clipboard.writeText(text);
        showToast('Скопировано!');
    }

    function openAddModal() {
        editId = null;
        document.getElementById('modalTitle').innerText = '➕ Новый объект';
        document.getElementById('address').value = '';
        document.getElementById('price').value = '';
        document.getElementById('rooms').value = '';
        document.getElementById('floor').value = '';
        document.getElementById('area').value = '';
        document.getElementById('balcony').value = '';
        document.getElementById('description').value = '';
        document.getElementById('photoUrl').value = '';
        document.getElementById('status').value = 'активно';
        document.getElementById('objectModal').classList.add('active');
    }

    function editObject(id) {
        const obj = objects.find(o => o.ID == id);
        if (!obj) return;
        editId = id;
        document.getElementById('modalTitle').innerText = '✏️ Редактировать';
        document.getElementById('address').value = obj.Адрес || '';
        document.getElementById('price').value = obj.Цена || '';
        document.getElementById('rooms').value = obj.Комнат || '';
        document.getElementById('floor').value = obj.Этаж || '';
        document.getElementById('area').value = obj.Площадь || '';
        document.getElementById('balcony').value = obj.Балкон || '';
        document.getElementById('description').value = obj.Описание || '';
        document.getElementById('photoUrl').value = obj.Фото || '';
        document.getElementById('status').value = obj.Статус || 'активно';
        document.getElementById('objectModal').classList.add('active');
    }

    async function saveObject() {
        const address = document.getElementById('address').value;
        const price = document.getElementById('price').value;
        if (!address || !price) { showToast('Заполните адрес и цену'); return; }
        
        const params = new URLSearchParams();
        params.append('action', 'addObject');
        params.append('address', address);
        params.append('price', price);
        params.append('rooms', document.getElementById('rooms').value);
        params.append('floor', document.getElementById('floor').value);
        params.append('area', document.getElementById('area').value);
        params.append('balcony', document.getElementById('balcony').value);
        params.append('description', document.getElementById('description').value);
        params.append('photoUrl', document.getElementById('photoUrl').value);
        params.append('status', document.getElementById('status').value);
        
        try {
            const response = await fetch(`${API_URL}?${params.toString()}`);
            const data = await response.json();
            if (data.status === 'success') {
                showToast('✅ Сохранено');
                closeModal();
                loadObjects();
            } else { showToast('Ошибка сохранения'); }
        } catch(e) { showToast('Ошибка соединения'); }
    }

    function closeModal() { document.getElementById('objectModal').classList.remove('active'); }

    window.loadObjects = loadObjects;
    window.openAddModal = openAddModal;
    window.editObject = editObject;
    window.saveObject = saveObject;
    window.closeModal = closeModal;
    window.toggleVisibility = toggleVisibility;
    window.copyObject = copyObject;

    loadObjects();
    document.getElementById('objectModal').addEventListener('click', (e) => { if (e.target === document.getElementById('objectModal')) closeModal(); });
</script>
</body>
</html>
