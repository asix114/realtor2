<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Объект | Людмила Мельверт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .btn-gold { background-color: #f5b042; }
        .btn-gold:hover { background-color: #e09e2e; }
        .text-gold { color: #f5b042; }
    </style>
</head>
<body class="bg-gray-50">

<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="логотип недвижка золотой.png" alt="Лого" class="h-8 w-auto">
            <div>
                <h1 class="text-lg font-bold text-gray-800">Людмила Мельверт</h1>
                <p class="text-xs text-gray-500">Риэлтор с 26-летним стажем</p>
            </div>
        </div>
        <a href="catalog.html" class="text-gray-600 hover:text-gold">← Назад</a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8">
    <div id="objectCard" class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="text-center py-10 text-gray-500">Загрузка...</div>
    </div>
</main>

<section class="bg-gray-900 text-white py-12 mt-8">
    <div class="max-w-3xl mx-auto px-4 text-center">
        <h2 class="text-2xl font-bold mb-4">Бесплатная консультация</h2>
        <p class="mb-6">Оставьте заявку — я перезвоню в течение часа</p>
        <form id="leadForm" class="flex flex-col md:flex-row gap-3">
            <input type="text" id="leadName" placeholder="Ваше имя" required class="flex-1 bg-white/20 text-white placeholder-white/70 px-4 py-3 rounded-xl">
            <input type="tel" id="leadPhone" placeholder="Телефон" required class="flex-1 bg-white/20 text-white placeholder-white/70 px-4 py-3 rounded-xl">
            <button type="submit" class="btn-gold text-gray-900 px-6 py-3 rounded-xl font-semibold">Отправить</button>
        </form>
        <div class="flex justify-center gap-4 mt-6">
            <a href="tel:89607635170" class="text-white"><i class="fas fa-phone"></i> +7 (960) 763-51-70</a>
            <a href="mailto:marigoda68@mail.ru" class="text-white"><i class="far fa-envelope"></i> marigoda68@mail.ru</a>
        </div>
    </div>
</section>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxQuSey6Pxiv9ctFpaQBZ5NLEYEuONUd6XaWTZOZC1YwM_-OewxpDZqydPYVko_grtv/exec';
    
    function getObjectId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }
    
    async function loadObject() {
        const id = getObjectId();
        if (!id) {
            document.getElementById('objectCard').innerHTML = '<div class="p-8 text-center text-red-500">❌ Объект не найден</div>';
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}?action=getObjects`);
            const data = await response.json();
            
            if (data.status === 'success') {
                const obj = data.objects.find(o => o.ID == id);
                
                if (!obj || obj.Статус !== 'активно') {
                    document.getElementById('objectCard').innerHTML = '<div class="p-8 text-center text-red-500">❌ Объект не найден или уже продан</div>';
                    return;
                }
                
                renderObject(obj);
            }
        } catch(e) {
            document.getElementById('objectCard').innerHTML = '<div class="p-8 text-center text-red-500">❌ Ошибка загрузки</div>';
        }
    }
    
    function renderObject(obj) {
        const container = document.getElementById('objectCard');
        
        container.innerHTML = `
            ${obj.Фото ? `<img src="${obj.Фото}" class="w-full h-96 object-cover" onerror="this.src='https://via.placeholder.com/800x500?text=Нет+фото'">` : '<div class="w-full h-96 bg-gray-200 flex items-center justify-center"><i class="fas fa-home text-gray-400 text-6xl"></i></div>'}
            <div class="p-6">
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">${obj.Адрес || 'Адрес не указан'}</h1>
                <p class="text-3xl md:text-4xl font-bold text-gold mt-2">${Number(obj.Цена).toLocaleString()} ₽</p>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6 py-4 border-y">
                    <div class="text-center">
                        <i class="fas fa-door-open text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">Комнат</p>
                        <p class="font-bold">${obj.Комнат || '?'}</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-layer-group text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">Этаж</p>
                        <p class="font-bold">${obj.Этаж || '?'}</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-ruler-combined text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">Площадь</p>
                        <p class="font-bold">${obj.Площадь || '?'} м²</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-building text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">Тип дома</p>
                        <p class="font-bold">${obj.Тип_дома || '?'}</p>
                    </div>
                </div>
                
                <div class="mt-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-3">📝 Описание</h2>
                    <p class="text-gray-600 leading-relaxed">${obj.Описание || 'Описание отсутствует'}</p>
                </div>
                
                <button onclick="showContactForm()" class="w-full mt-8 btn-gold text-gray-900 py-3 rounded-xl font-semibold text-lg">
                    📞 Записаться на просмотр
                </button>
            </div>
        `;
    }
    
    function showContactForm() {
        document.getElementById('leadForm').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('leadName').focus();
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm z-50';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Отправка заявки
    const leadForm = document.getElementById('leadForm');
    if (leadForm) {
        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('leadName').value;
            const phone = document.getElementById('leadPhone').value;
            const objectId = getObjectId();
            
            try {
                await fetch(`${API_URL}?action=addLead&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&object=${encodeURIComponent(objectId)}`);
                showToast('✅ Заявка отправлена! Я свяжусь с вами.');
                leadForm.reset();
            } catch(e) {
                showToast('Ошибка. Позвоните по телефону.');
            }
        });
    }
    
    loadObject();
</script>
</body>
</html>
