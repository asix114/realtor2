<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карточка объекта | Людмила Мельверт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .btn-gold { background-color: #f5b042; }
        .btn-gold:hover { background-color: #e09e2e; }
        .text-gold { color: #f5b042; }
        body { font-size: 16px; }
        .info-row { padding: 12px 0; border-bottom: 1px solid #e5e7eb; }
        @media (max-width: 640px) {
            .price { font-size: 28px; }
            .address { font-size: 20px; }
        }
    </style>
</head>
<body class="bg-gray-50">

<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-2">
        <div class="flex items-center gap-3">
            <img src="логотип недвижка золотой.png" alt="Лого" class="h-10 w-auto">
            <div>
                <h1 class="text-xl font-bold text-gray-800">ЛЮДМИЛА МЕЛЬВЕРТ</h1>
                <p class="text-xs text-gray-500">РИЭЛТОР С 26-ЛЕТНИМ СТАЖЕМ</p>
            </div>
        </div>
        <a href="catalog.html" class="text-gray-600 hover:text-gold text-base font-semibold">← НАЗАД В КАТАЛОГ</a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8">
    <div id="objectCard" class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="text-center py-10 text-gray-500 text-base">ЗАГРУЗКА...</div>
    </div>
</main>

<!-- ФОРМА СВЯЗИ -->
<section class="bg-gray-900 text-white py-12 mt-8">
    <div class="max-w-3xl mx-auto px-4 text-center">
        <h2 class="text-2xl font-bold mb-4">БЕСПЛАТНАЯ КОНСУЛЬТАЦИЯ</h2>
        <p class="mb-6 text-base">ОСТАВЬТЕ ЗАЯВКУ — Я ПЕРЕЗВОНЮ В ТЕЧЕНИЕ ЧАСА</p>
        <form id="leadForm" class="flex flex-col md:flex-row gap-3">
            <input type="text" id="leadName" placeholder="ВАШЕ ИМЯ" required class="flex-1 bg-white/20 text-white placeholder-white/70 px-4 py-3 rounded-xl text-base">
            <input type="tel" id="leadPhone" placeholder="ТЕЛЕФОН" required class="flex-1 bg-white/20 text-white placeholder-white/70 px-4 py-3 rounded-xl text-base">
            <button type="submit" class="btn-gold text-gray-900 px-6 py-3 rounded-xl font-semibold text-base">ОТПРАВИТЬ</button>
        </form>
        <div class="flex justify-center gap-4 mt-6 flex-wrap">
            <a href="tel:89607635170" class="text-white text-base"><i class="fas fa-phone"></i> +7 (960) 763-51-70</a>
            <a href="mailto:marigoda68@mail.ru" class="text-white text-base"><i class="far fa-envelope"></i> marigoda68@mail.ru</a>
        </div>
    </div>
</section>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzLE7IFiWI-aH9cTgPkT1AGmAwUym4ggyZIvD7UdD3CJXxf6UT7mlOLwV7PNQx28IuX/exec';
    
    function getObjectId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }
    
    async function loadObject() {
        const id = getObjectId();
        if (!id) {
            document.getElementById('objectCard').innerHTML = '<div class="p-8 text-center text-red-500 text-base">❌ ОБЪЕКТ НЕ НАЙДЕН</div>';
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}?action=getObjects`);
            const data = await response.json();
            
            if (data.status === 'success') {
                const obj = data.objects.find(o => o.ID == id);
                
                if (!obj || obj.Статус !== 'активно') {
                    document.getElementById('objectCard').innerHTML = '<div class="p-8 text-center text-red-500 text-base">❌ ОБЪЕКТ НЕ НАЙДЕН ИЛИ УЖЕ ПРОДАН</div>';
                    return;
                }
                
                renderObject(obj);
            }
        } catch(e) {
            document.getElementById('objectCard').innerHTML = '<div class="p-8 text-center text-red-500 text-base">❌ ОШИБКА ЗАГРУЗКИ</div>';
        }
    }
    
    function renderObject(obj) {
        const container = document.getElementById('objectCard');
        
        container.innerHTML = `
            <div class="p-6">
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 address">${obj.Адрес || 'АДРЕС НЕ УКАЗАН'}</h1>
                <p class="text-3xl md:text-4xl font-bold text-gold mt-2 price">${Number(obj.Цена).toLocaleString()} ₽</p>
                
                <!-- ХАРАКТЕРИСТИКИ -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6 py-4 border-y">
                    <div class="text-center">
                        <i class="fas fa-door-open text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">КОМНАТ</p>
                        <p class="font-bold text-lg">${obj.Комнат || '?'}</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-layer-group text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">ЭТАЖ</p>
                        <p class="font-bold text-lg">${obj.Этаж || '?'}/${obj.Всего_этажей || '?'}</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-ruler-combined text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">ПЛОЩАДЬ</p>
                        <p class="font-bold text-lg">${obj.Площадь || '?'} м²</p>
                    </div>
                    <div class="text-center">
                        <i class="fas fa-building text-2xl text-gold"></i>
                        <p class="text-sm text-gray-500 mt-1">ТИП ДОМА</p>
                        <p class="font-bold text-lg">${obj.Тип_дома || '?'}</p>
                    </div>
                </div>
                
                ${obj.Балкон ? `<div class="mt-4 text-center"><i class="fas fa-umbrella text-gold"></i> <span class="text-gray-600 text-base">${obj.Балкон}</span></div>` : ''}
                
                <!-- ОПИСАНИЕ -->
                <div class="mt-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-3">📝 ОПИСАНИЕ</h2>
                    <p class="text-gray-600 leading-relaxed text-base">${obj.Описание || 'ОПИСАНИЕ ОТСУТСТВУЕТ'}</p>
                </div>
                
                <!-- ФОТОГРАФИИ -->
                ${obj.Яндекс_папка ? `
                    <div class="mt-6">
                        <h2 class="text-xl font-bold text-gray-800 mb-3">📸 ФОТОГРАФИИ</h2>
                        <a href="${obj.Яндекс_папка}" target="_blank" class="btn-gold text-gray-900 px-5 py-2 rounded-lg font-semibold inline-block text-base">ОТКРЫТЬ ПАПКУ С ФОТО →</a>
                    </div>
                ` : ''}
                
                <!-- КНОПКА ЗАЯВКИ -->
                <button onclick="showContactForm()" class="w-full mt-8 btn-gold text-gray-900 py-3 rounded-xl font-semibold text-lg">
                    📞 ЗАПИСАТЬСЯ НА ПРОСМОТР
                </button>
            </div>
        `;
    }
    
    function showContactForm() {
        document.getElementById('leadForm').scrollIntoView({ behavior: 'smooth' });
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-2 rounded-full text-base z-50';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ФОРМА ЗАЯВКИ
    const leadForm = document.getElementById('leadForm');
    if (leadForm) {
        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('leadName').value;
            const phone = document.getElementById('leadPhone').value;
            const objectId = getObjectId();
            
            try {
                await fetch(`${API_URL}?action=addLead&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&object=${encodeURIComponent(objectId)}`);
                showToast('✅ ЗАЯВКА ОТПРАВЛЕНА! Я СВЯЖУСЬ С ВАМИ.');
                leadForm.reset();
            } catch(e) {
                showToast('❌ ОШИБКА. ПОЗВОНИТЕ ПО ТЕЛЕФОНУ.');
            }
        });
    }
    
    loadObject();
</script>
</body>
</html>
