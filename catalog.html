<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Каталог квартир | Людмила Мельверт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .btn-gold { background-color: #f5b042; }
        .btn-gold:hover { background-color: #e09e2e; }
        .text-gold { color: #f5b042; }
    </style>
</head>
<body class="bg-gray-50">

<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="логотип недвижка золотой.png" alt="Лого" class="h-8 w-auto">
            <div>
                <h1 class="text-lg font-bold text-gray-800">Людмила Мельверт</h1>
                <p class="text-xs text-gray-500">Риэлтор с 26-летним стажем</p>
            </div>
        </div>
        <a href="#contact" class="btn-gold text-gray-900 px-4 py-1.5 rounded-xl text-sm font-semibold">Бесплатно</a>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800">🏠 Каталог квартир</h1>
        <p class="text-gray-600 mt-2">Шарыпово и Ужур</p>
    </div>

    <div class="bg-white rounded-xl p-4 mb-8 shadow-sm">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <input type="text" id="filterAddress" placeholder="Поиск по адресу" class="border rounded-lg px-3 py-2 text-sm">
            <select id="filterRooms" class="border rounded-lg px-3 py-2 text-sm">
                <option value="">Все комнаты</option>
                <option value="1">1 комната</option>
                <option value="2">2 комнаты</option>
                <option value="3">3 комнаты</option>
                <option value="4">4+ комнаты</option>
            </select>
            <input type="number" id="filterPriceMax" placeholder="Макс. цена" class="border rounded-lg px-3 py-2 text-sm">
            <button onclick="loadObjects()" class="btn-gold text-gray-900 px-4 py-2 rounded-lg font-semibold">🔍 Найти</button>
        </div>
    </div>

    <div id="objectsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="text-center py-10 text-gray-500 col-span-3">Загрузка...</div>
    </div>
</main>

<section id="contact" class="bg-gray-900 text-white py-12 mt-8">
    <div class="max-w-3xl mx-auto px-4 text-center">
        <h2 class="text-2xl font-bold mb-4">Бесплатная консультация</h2>
        <p class="mb-6">Оставьте заявку — я перезвоню в течение часа</p>
        <form id="leadForm" class="flex flex-col md:flex-row gap-3">
            <input type="text" id="leadName" placeholder="Ваше имя" required class="flex-1 bg-white/20 text-white placeholder-white/70 px-4 py-3 rounded-xl">
            <input type="tel" id="leadPhone" placeholder="Телефон" required class="flex-1 bg-white/20 text-white placeholder-white/70 px-4 py-3 rounded-xl">
            <button type="submit" class="btn-gold text-gray-900 px-6 py-3 rounded-xl font-semibold">Отправить</button>
        </form>
        <div class="flex justify-center gap-4 mt-6">
            <a href="tel:89607635170" class="text-white"><i class="fas fa-phone"></i> +7 (960) 763-51-70</a>
            <a href="mailto:marigoda68@mail.ru" class="text-white"><i class="far fa-envelope"></i> marigoda68@mail.ru</a>
        </div>
    </div>
</section>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzSgA18PGRrjVO2fKMtfNp7gfOpv0gdiJIrXe9vEG_95gvTxDwM2zfVAOTZ2DqoYnBZ/exec';
    
    async function loadObjects() {
        const address = document.getElementById('filterAddress').value.toLowerCase();
        const rooms = document.getElementById('filterRooms').value;
        const priceMax = document.getElementById('filterPriceMax').value;
        
        try {
            const response = await fetch(`${API_URL}?action=getObjects`);
            const data = await response.json();
            
            if (data.status === 'success') {
                let objects = data.objects || [];
                objects = objects.filter(obj => obj.Статус === 'активно');
                
                if (address) objects = objects.filter(obj => obj.Адрес?.toLowerCase().includes(address));
                if (rooms) objects = objects.filter(obj => obj.Комнат == rooms);
                if (priceMax) objects = objects.filter(obj => Number(obj.Цена) <= Number(priceMax));
                
                renderObjects(objects);
            }
        } catch(e) {
            console.error(e);
        }
    }
    
    function renderObjects(objects) {
        const container = document.getElementById('objectsList');
        
        if (objects.length === 0) {
            container.innerHTML = '<div class="text-center py-10 text-gray-500 col-span-3">🏠 Нет объектов</div>';
            return;
        }
        
        container.innerHTML = objects.map(obj => `
            <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
                <div class="w-full h-48 bg-gray-200 flex items-center justify-center">
                    <i class="fas fa-home text-gray-400 text-5xl"></i>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-lg text-gray-800">${obj.Адрес || 'Адрес не указан'}</h3>
                    <p class="text-2xl font-bold text-gold mt-1">${Number(obj.Цена).toLocaleString()} ₽</p>
                    <div class="flex gap-3 mt-2 text-sm text-gray-600">
                        <span><i class="fas fa-door-open"></i> ${obj.Комнат || '?'} комн.</span>
                        <span><i class="fas fa-layer-group"></i> ${obj.Этаж || '?'}/${obj.Всего_этажей || '?'} эт.</span>
                        <span><i class="fas fa-ruler-combined"></i> ${obj.Площадь || '?'} м²</span>
                    </div>
                    ${obj.Яндекс_папка ? `<div class="mt-2 text-xs text-blue-500">📁 <a href="${obj.Яндекс_папка}" target="_blank">Смотреть фото</a></div>` : ''}
                    <a href="object.html?id=${obj.ID}" class="block w-full mt-4 btn-gold text-gray-900 py-2 rounded-lg font-semibold text-center">🔍 Подробнее</a>
                </div>
            </div>
        `).join('');
    }
    
    const leadForm = document.getElementById('leadForm');
    if (leadForm) {
        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('leadName').value;
            const phone = document.getElementById('leadPhone').value;
            
            try {
                await fetch(`${API_URL}?action=addLead&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`);
                showToast('✅ Заявка отправлена! Я свяжусь с вами.');
                leadForm.reset();
            } catch(e) {
                showToast('Ошибка. Позвоните по телефону.');
            }
        });
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm z-50';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    loadObjects();
</script>
</body>
</html>
